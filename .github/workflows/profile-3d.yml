name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Post-process SVG (hide radar, pie, stats)
        run: |
          python3 - <<'EOF'
          import re, glob

          for path in glob.glob("profile-3d-contrib/profile-green*.svg"):
              with open(path, "r", encoding="utf-8") as f:
                  svg = f.read()

              # # 레이더 차트 숨기기: <g transform="translate(NNN, NNN)"> 중 pentagon(line x1="0") 포함 블록
              # svg = re.sub(
              #     r'(<g transform="translate\(\d+(?:\.\d+)?,\s*\d+(?:\.\d+)?\)"><line x1="0")',
              #     r'<g transform="translate(0,0)" style="display:none"><line x1="0"',
              #     svg
              # )

              # # 파이 차트 + 언어 범례 숨기기: <g transform="translate(40, 520)"> 블록
              # svg = re.sub(
              #     r'(<g transform="translate\(40,\s*520\)">)',
              #     r'<g transform="translate(40, 520)" style="display:none">',
              #     svg
              # )

              # 스타 아이콘 + 스타 수 숨기기
              svg = re.sub(
                  r'<g transform="translate\(\d+(?:\.\d+)?,\s*\d+(?:\.\d+)?\),\s*scale\(2\)"><path fill-rule="evenodd" d="M8 \.25',
                  r'<g style="display:none"><path fill-rule="evenodd" d="M8 .25',
                  svg
              )
              svg = re.sub(
                  r'(<text[^>]*>\d+<title>\d+</title></text><g transform="translate\(\d+(?:\.\d+)?,\s*\d+(?:\.\d+)?\),\s*scale\(2\)"><path fill-rule="evenodd" d="M5)',
                  r'<text style="display:none">0<title>0</title></text><g style="display:none"><path fill-rule="evenodd" d="M5',
                  svg
              )
              # 포크 아이콘 + 포크 수 숨기기
              svg = re.sub(
                  r'<g transform="translate\(\d+(?:\.\d+)?,\s*\d+(?:\.\d+)?\),\s*scale\(2\)"><path fill-rule="evenodd" d="M5 3',
                  r'<g style="display:none"><path fill-rule="evenodd" d="M5 3',
                  svg
              )
              svg = re.sub(
                  r'<text[^>]*>\d+<title>\d+</title></text></g></g>',
                  r'<text style="display:none">0<title>0</title></text></g></g>',
                  svg
              )

              with open(path, "w", encoding="utf-8") as f:
                  f.write(svg)
          EOF

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated"; then
            git push
          fi